<!DOCTYPE html>
<html>
<head>

<title>MediCore</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>

.navbar {
border-bottom: 1px solid #e5e7eb;
}


.table-hover tbody tr:hover {
background-color: #f5f7fa;
transition: 0.2s;
}

.sidebar-link{
display:flex;
align-items:center;
gap:10px;
padding:10px 15px;
border-radius:8px;
transition:all 0.2s ease;
color:white;
text-decoration:none;
}

.sidebar-link:hover{
background:#495057;
}

</style>

</head>

<body style="background:#f5f7fa;">

<div class="container-fluid">

<div class="row">

<!-- Sidebar -->

<div class="col-md-2 bg-dark text-white min-vh-100 p-3">

<h4 class="fw-bold text-center mb-4">MediCore</h4>

<div class="text-center mb-3">

<i class="bi bi-person-circle fs-2"></i>

<p class="mt-2 mb-0">Welcome</p>

<strong>{{ request.user.username }}</strong>

</div>

<hr>

<hr>

<ul class="nav flex-column list-unstyled">

<li class="nav-item mb-2">

<a class="sidebar-link" href="/dashboard/">
<i class="bi bi-speedometer2"></i> Dashboard
</a>
</li>

<li class="nav-item mb-2">
<a class="sidebar-link" href="/doctors/">
<i class="bi bi-person-badge"></i> Doctors
</a>
</li>

<li class="nav-item mb-2">
<a class="sidebar-link" href="/patients/">
<i class="bi bi-people"></i> Patients
</a>
</li>

<li class="nav-item mb-2">
<a class="sidebar-link" href="/appointments/">
<i class="bi bi-calendar-check"></i> Appointments
</a>
</li>

<li class="nav-item mb-2">
<a class="sidebar-link" href="/admin/">
<i class="bi bi-gear"></i> Admin
</a>
</li>

<li>
    <a class="sidebar-link" href="/book-appointment/">
<i class="bi bi-calendar-plus"></i> Book Appointment
</a>
</li>

<li class="nav-item mt-3">
<a class="sidebar-link text-danger" href="/logout/">
<i class="bi bi-box-arrow-right"></i> Logout
</a>
</li>

</ul>

</div>

<!-- Main Content -->

<div class="col-md-10 p-4">

{% block content %}

{% endblock %}

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>
</html>
