{% extends "base.html" %}

{% block content %}

<h2 class="mb-4 fw-bold">Appointments</h2>

<a href="/admin/hospital/appointment/add/" class="btn btn-dark mb-3">
+ Add Appointment
</a>

<table class="table table-hover table-striped shadow-sm">

<thead>
<tr>
<th>Patient</th>
<th>Doctor</th>
<th>Date</th>
<th>Status</th>
</tr>
</thead>

<tbody>

{% for appointment in appointments %}

<tr>
<td>{{ appointment.patient.name }}</td>
<td>{{ appointment.doctor.name }}</td>
<td>{{ appointment.appointment_date }}</td>
<td>{{ appointment.status }}</td>
</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
